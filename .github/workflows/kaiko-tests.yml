# Run the CPU unit suite on a PR and fail only on tests that regress vs main.
# Logic lives in tools/ci/run_tests.sh (also runnable locally).
name: kaiko tests

on:
  # SECURITY: keep this as `pull_request`. Never switch to `pull_request_target`:
  # that runs with the base repo's secrets in the context of untrusted PR code,
  # turning this job (which checks out and executes PR contents) into a token/
  # secret exfiltration vector.
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs, i.e. don't let stale commits launch runs that pile up on a busy PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      IMAGE: ghcr.io/kaiko-ai/nvidia-nemo-mirror:26.06
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check out main as the baseline
        run: |
          git fetch --no-tags --depth=1 origin main
          git worktree add /tmp/base FETCH_HEAD

      # Image is ~60 GB unpacked and runner free disk varies, so reclaim ~20 GB
      # (preinstalled toolchains we don't use) to pull reliably. df brackets the pull.
      - name: Free disk
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android
          echo "after reclaim:"; df -h /

      - name: Log in to ghcr
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: time docker pull "${IMAGE}"

      - name: Disk after pull
        run: df -h /

      - name: Run tests (regressions vs main)
        run: bash tools/ci/run_tests.sh /tmp/base "${GITHUB_WORKSPACE}"
