name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=$(
            git log --no-merges --format='%H %s' "$BASE_SHA".."$HEAD_SHA" |
            while read -r sha subject; do
              if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
                printf '  %s %s\n' "$sha" "$subject"
              fi
            done
          )
          if [ -n "$missing" ]; then
            echo "::error::Commits missing DCO sign-off:"
            echo "$missing"
            echo
            echo "Add 'Signed-off-by:' with 'git commit -s', or"
            echo "rewrite history with 'git rebase --signoff <base>'."
            exit 1
          fi
          echo "All commits signed off."
